name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev-tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG="${{ steps.prev-tag.outputs.prev_tag }}"
          OUTFILE=$(mktemp)

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "$PREV_TAG"..HEAD --pretty=format:"%h|%s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"%h|%s" --no-merges -20)
          fi

          FEATS=""
          FIXES=""
          CHORES=""
          DOCS=""
          REFACTORS=""
          OTHER=""

          while IFS='|' read -r HASH MSG; do
            [ -z "$HASH" ] && continue
            SHORT="${HASH:0:7}"
            LINE="- ${MSG} (\`${SHORT}\`)"

            TYPES=$(echo "$MSG" | grep -oiE '(feat|fix|chore|docs|refactor|perf|test|ci|build|style)\s*(\([^)]*\))?\s*:' | tr '[:upper:]' '[:lower:]' | sort -u)

            if [ -z "$TYPES" ]; then
              OTHER="${OTHER}${LINE}"$'\n'
              continue
            fi

            for TYPE in $TYPES; do
              case "$TYPE" in
                feat*)  FEATS="${FEATS}${LINE}"$'\n' ;;
                fix*)   FIXES="${FIXES}${LINE}"$'\n' ;;
                chore*) CHORES="${CHORES}${LINE}"$'\n' ;;
                docs*)  DOCS="${DOCS}${LINE}"$'\n' ;;
                refactor*) REFACTORS="${REFACTORS}${LINE}"$'\n' ;;
                *) OTHER="${OTHER}${LINE}"$'\n' ;;
              esac
            done
          done <<< "$COMMITS"

          {
            echo "### Features"
            echo ""
            if [ -n "$FEATS" ]; then printf "%s" "$FEATS"; else echo "- Nenhuma"; fi
            echo ""
            echo "### Bug Fixes"
            echo ""
            if [ -n "$FIXES" ]; then printf "%s" "$FIXES"; else echo "- Nenhum"; fi
            echo ""
            echo "### Chores"
            echo ""
            if [ -n "$CHORES" ]; then printf "%s" "$CHORES"; else echo "- Nenhum"; fi
            if [ -n "$DOCS" ]; then
              echo ""
              echo "### Documentation"
              echo ""
              printf "%s" "$DOCS"
            fi
            if [ -n "$REFACTORS" ]; then
              echo ""
              echo "### Refactors"
              echo ""
              printf "%s" "$REFACTORS"
            fi
            if [ -n "$OTHER" ]; then
              echo ""
              echo "### Other Changes"
              echo ""
              printf "%s" "$OTHER"
            fi
          } > "$OUTFILE"

          {
            echo "changelog<<CHANGELOG_EOF"
            cat "$OUTFILE"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## ${{ github.ref_name }}

            ${{ steps.changelog.outputs.changelog }}

            ## Install

            ```bash
            git clone https://github.com/melloxyz/sessionless.git
            cd sessionless
            pnpm install
            pnpm dev
            ```
          generate_release_notes: false
